<!DOCTYPE html>
<html>
<head>
  <title>แอปแรกของฉัน</title>
</head>
<body>

  <h1>สวัสดี 👋</h1>
  <button onclick="sayHello()">กดฉันสิ</button>

  <p id="text"></p>

  <script>
    function sayHello() {
      document.getElementById("text").innerHTML = "สวัสดีจ้า 🎉";
    }
  </script>

</body>
</html>
